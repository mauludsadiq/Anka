version: "3.8"

services:
  origin:
    platform: linux/amd64
    build: .
    command: fardrun run --program anka/src/origin_process.fard --out out/origin
    ports:
      - "18090:18090"
    volumes:
      - origin_data:/app/out/origin
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18090/health"]
      interval: 3s
      timeout: 2s
      retries: 10

  alice:
    platform: linux/amd64
    build: .
    command: fardrun run --program anka/src/node_process.fard --out out/node
    ports:
      - "18080:18080"
    volumes:
      - alice_data:/app/out/node
    depends_on:
      origin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18080/health"]
      interval: 3s
      timeout: 2s
      retries: 10

  bob:
    platform: linux/amd64
    build: .
    command: fardrun run --program anka/src/node_process_b.fard --out out/node
    ports:
      - "18081:18081"
    volumes:
      - bob_data:/app/out/node
    depends_on:
      origin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18081/health"]
      interval: 3s
      timeout: 2s
      retries: 10

  adapter:
    image: python:3.11-slim
    command: python3 /app/anka/src/runtime/adapters/anka_adapter.py --institution the-gap --port 19200
    ports:
      - "19200:19200"
    volumes:
      - ./anka:/app/anka
    environment:
      - SHOPIFY_STORE=anka-test-store.myshopify.com
      - SHOPIFY_TOKEN=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
    working_dir: /app

  demo:
    platform: linux/amd64
    build: .
    command: bash /app/anka/docker-demo.sh
    depends_on:
      alice:
        condition: service_healthy
      bob:
        condition: service_healthy
      adapter:
        condition: service_started
    environment:
      - ALICE=http://alice:18080
      - BOB=http://bob:18081
      - ORIGIN=http://origin:18090
      - ADAPTER=http://adapter:19200

volumes:
  origin_data:
  alice_data:
  bob_data:
