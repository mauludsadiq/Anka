version: "3.8"

services:
  origin:
    build: .
    command: fardrun run --program anka/src/origin_process.fard --out out/origin
    ports:
      - "18090:18090"
    volumes:
      - origin_data:/anka/out/origin
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18090/health"]
      interval: 3s
      timeout: 2s
      retries: 10

  alice:
    build: .
    command: fardrun run --program anka/src/node_process.fard --out out/node
    ports:
      - "18080:18080"
    volumes:
      - alice_data:/anka/out/node
    depends_on:
      origin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18080/health"]
      interval: 3s
      timeout: 2s
      retries: 10

  bob:
    build: .
    command: fardrun run --program anka/src/node_process_b.fard --out out/node
    ports:
      - "18081:18081"
    volumes:
      - bob_data:/anka/out/node
    depends_on:
      origin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18081/health"]
      interval: 3s
      timeout: 2s
      retries: 10

  policy:
    build: .
    command: fardrun run --program anka/src/policy_process.fard --out out/policy
    ports:
      - "18082:18082"
    volumes:
      - policy_data:/anka/out/policy
    depends_on:
      origin:
        condition: service_healthy

  demo:
    build: .
    command: bash /anka/docker-demo.sh
    depends_on:
      alice:
        condition: service_healthy
      bob:
        condition: service_healthy
    environment:
      - ALICE=http://alice:18080
      - BOB=http://bob:18081
      - ORIGIN=http://origin:18090

volumes:
  origin_data:
  alice_data:
  bob_data:
  policy_data:
