version: "3.8"

services:
  origin:
    build: .
    command: fardrun run --program anka/src/origin_process.fard --out out/origin
    ports:
      - "18090:18090"
    volumes:
      - origin_data:/anka/out/origin
    environment:
      - ANKA_NODE_NAME=anka-origin
      - ANKA_NODE_PORT=18090
      - ANKA_NODE_ADDRESS=http://origin:18090
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18090/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  node:
    build: .
    command: fardrun run --program anka/src/node_process.fard --out out/node
    ports:
      - "18080:18080"
    volumes:
      - node_data:/anka/out/node
    environment:
      - ANKA_NODE_NAME=anka-node
      - ANKA_NODE_PORT=18080
      - ANKA_NODE_ADDRESS=http://node:18080
    depends_on:
      origin:
        condition: service_healthy

  node_b:
    build: .
    command: fardrun run --program anka/src/node_process_b.fard --out out/node
    ports:
      - "18081:18081"
    volumes:
      - node_b_data:/anka/out/node
    environment:
      - ANKA_NODE_NAME=anka-node-b
      - ANKA_NODE_PORT=18081
      - ANKA_NODE_ADDRESS=http://node_b:18081
    depends_on:
      origin:
        condition: service_healthy

  policy:
    build: .
    command: fardrun run --program anka/src/policy_process.fard --out out/policy
    ports:
      - "18082:18082"
    volumes:
      - policy_data:/anka/out/policy
    depends_on:
      origin:
        condition: service_healthy

volumes:
  origin_data:
  node_data:
  node_b_data:
  policy_data:
