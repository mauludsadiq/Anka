# ANKA Node — Caddy TLS reverse proxy
# Caddy handles certificate provisioning automatically via Let's Encrypt
# Replace YOUR_DOMAIN and YOUR_PORT

YOUR_DOMAIN {
    reverse_proxy 127.0.0.1:YOUR_PORT

    header {
        # Security headers
        Strict-Transport-Security "max-age=31536000; includeSubDomains"
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
    }

    log {
        output file /var/log/caddy/anka-node.log
    }
}
