# anka-node.nginx.conf
# TLS reverse proxy for an ANKA node.
# Place your certificate at /etc/ssl/anka/node.crt
# Place your key at /etc/ssl/anka/node.key
# Or use certbot: certbot --nginx -d your-node-domain.example.com

server {
    listen 443 ssl;
    server_name your-node-domain.example.com;

    ssl_certificate     /etc/ssl/anka/node.crt;
    ssl_certificate_key /etc/ssl/anka/node.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Health check -- no auth required
    location /health {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # All ANKA endpoints
    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name your-node-domain.example.com;
    return 301 https://$host$request_uri;
}
